<!DOCTYPE html>
<html>
<head>
<style>
  .none { pointer-events: none; }
  .all { pointer-events: all; }
</style>
</head>
<body>
  <div class="none" id="parent" style="width: 100px; height: 100px; background: red;">
    <svg width="100" height="100">
      <circle cx="50" cy="50" r="40" fill="blue" class="all" id="child" />
    </svg>
  </div>
  <script>
    document.getElementById('parent').addEventListener('click', () => console.log('parent clicked'));
    document.getElementById('child').addEventListener('click', (e) => { console.log('child clicked'); e.stopPropagation(); });
    document.body.addEventListener('click', () => console.log('body clicked'));
  </script>
</body>
</html>
